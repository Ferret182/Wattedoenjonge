<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evenementen in de buurt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #eee;
      --text-primary: #111;
      --text-secondary: #666;
      --text-muted: #999;
      --week-line: #e0e0e0;
      --desc-border: #f0f0f0;
      --hero-border: #eee;
      --input-bg: #f9f9f9;
      --overlay-bg: rgba(0,0,0,0.4);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --surface: #1e1e1e;
        --border: #2e2e2e;
        --text-primary: #f0f0f0;
        --text-secondary: #aaa;
        --text-muted: #666;
        --week-line: #2e2e2e;
        --desc-border: #2a2a2a;
        --hero-border: #2e2e2e;
        --input-bg: #2a2a2a;
        --overlay-bg: rgba(0,0,0,0.7);
      }
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      padding: 0 0 60px;
    }

    /* ── Hero ── */
    .hero {
      background: var(--surface);
      border-bottom: 1px solid var(--hero-border);
      text-align: center;
      padding: 48px 20px 36px;
      margin-bottom: 40px;
    }

    .hero h1 {
      font-size: 32px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .hero p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .hero p a {
      color: #3367d6;
      text-decoration: none;
      font-weight: 500;
    }

    .hero p a:hover { text-decoration: underline; }

    .btn-submit {
      display: inline-block;
      background: #3367d6;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: #2a56c0; }

    /* ── Week sections ── */
    .week-section {
      max-width: 1100px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }

    .week-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .week-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .week-label.current { color: #3367d6; }

    .week-line {
      flex: 1;
      height: 1px;
      background: var(--week-line);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .category {
      display: inline-block;
      background: #e8f0fe;
      color: #3367d6;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
    }

    @media (prefers-color-scheme: dark) {
      .category { background: #1a2f6e33; color: #5b8dee; }
    }

    .price-free {
      display: inline-block;
      background: #e6f4ea;
      color: #1e7e34;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
    }

    @media (prefers-color-scheme: dark) {
      .price-free { background: #1a3a2033; color: #4caf50; }
    }

    .price-paid {
      display: inline-block;
      background: #fff3e0;
      color: #e65100;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
    }

    @media (prefers-color-scheme: dark) {
      .price-paid { background: #3a200a33; color: #ff9800; }
    }

    .card h2 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .meta { display: flex; flex-direction: column; gap: 5px; }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      border-top: 1px solid var(--desc-border);
      padding-top: 12px;
      margin-top: 12px;
    }

    .recurring-badge {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      display: block;
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 0;
      font-size: 15px;
    }

    .error {
      text-align: center;
      color: #e74c3c;
      padding: 60px 0;
      font-size: 15px;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid var(--border);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    .modal-close:hover { color: var(--text-primary); }

    /* ── Form ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text-primary);
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      font-family: sans-serif;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #3367d6;
    }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .btn-send {
      width: 100%;
      background: #3367d6;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 13px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-send:hover { background: #2a56c0; }
    .btn-send:disabled { background: #aaa; cursor: not-allowed; }

    .form-success {
      text-align: center;
      padding: 20px 0;
    }

    .form-success .check {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .form-success h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .form-success p {
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Evenementen in de buurt</h1>
    <p>Voor suggesties DM <a href="https://instagram.com/timo.182" target="_blank">@timo.182</a> op instagram</p>
    <button class="btn-submit" onclick="openModal()">+ Evenement indienen</button>
  </div>

  <div id="app"><p class="loading">Evenementen laden...</p></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Evenement indienen</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div id="form-content">
        <p class="form-note">Je evenement wordt eerst beoordeeld voordat het op de pagina verschijnt.</p>

        <div class="form-group">
          <label>Naam evenement *</label>
          <input type="text" id="f-title" placeholder="bijv. Zomerfestival Amsterdam" />
        </div>

        <div class="form-group">
          <label>Omschrijving</label>
          <textarea id="f-description" placeholder="Wat houdt het evenement in?"></textarea>
        </div>

        <div class="form-group">
          <label>Locatie</label>
          <input type="text" id="f-location" placeholder="bijv. Vondelpark, Amsterdam" />
        </div>

        <div class="form-group">
          <label>Categorie</label>
          <select id="f-category">
            <option value="">— Selecteer categorie —</option>
            <option>Muziek</option>
            <option>Sport</option>
            <option>Kunst</option>
            <option>Eten & Drinken</option>
            <option>Markt</option>
            <option>Festival</option>
            <option>Anders</option>
          </select>
        </div>

        <div class="form-group">
          <label>Datum</label>
          <input type="date" id="f-date" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Begintijd</label>
            <input type="time" id="f-start" />
          </div>
          <div class="form-group">
            <label>Eindtijd</label>
            <input type="time" id="f-end" />
          </div>
        </div>

        <div class="form-group">
          <label>Prijs (€) — voor gratis evenementen dit vakje leeg laten.</label>
          <input type="number" id="f-price" placeholder="bijv. 12.50" min="0" step="0.01" />
        </div>

        <div class="form-group">
          <label>Contactgegevens (optioneel)</label>
          <input type="text" id="f-contact" placeholder="bijv. e-mail of Instagram" />
        </div>

        <button class="btn-send" id="btn-send" onclick="submitForm()">Indienen</button>
      </div>

      <div id="form-success" style="display:none;" class="form-success">
        <div class="check">✅</div>
        <h3>Bedankt voor je inzending!</h3>
        <p>We beoordelen je evenement zo snel mogelijk.</p>
      </div>
    </div>
  </div>

  <script>
    /* ── Modal ── */
    function openModal() {
      document.getElementById("modal").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
      document.body.style.overflow = "";
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById("modal")) closeModal();
    }

    /* ── Form submit ── */
    async function submitForm() {
      const title = document.getElementById("f-title").value.trim();
      if (!title) {
        alert("Vul minimaal de naam van het evenement in.");
        return;
      }

      const btn = document.getElementById("btn-send");
      btn.disabled = true;
      btn.textContent = "Bezig met versturen...";

      const price = document.getElementById("f-price").value;

      const payload = {
        title,
        description: document.getElementById("f-description").value.trim() || null,
        location:    document.getElementById("f-location").value.trim() || null,
        category:    document.getElementById("f-category").value || null,
        date:        document.getElementById("f-date").value || null,
        starting_time: document.getElementById("f-start").value || null,
        ending_time:   document.getElementById("f-end").value || null,
        price:       price !== "" ? parseFloat(price) : null,
        contact:     document.getElementById("f-contact").value.trim() || null,
      };

      try {
        const res = await fetch("https://wattedoenjonge-production.up.railway.app/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          document.getElementById("form-content").style.display = "none";
          document.getElementById("form-success").style.display = "block";
        } else {
          throw new Error();
        }
      } catch {
        alert("Er is iets misgegaan. Probeer het opnieuw.");
        btn.disabled = false;
        btn.textContent = "Indienen";
      }
    }

    /* ── Helpers ── */
    function formatTime(t) {
      if (!t) return "";
      return t.slice(0, 5);
    }

    function formatPrice(price) {
      if (price === null || price === undefined || price === "") {
        return '<span class="price-free">Gratis</span>';
      }
      const num = parseFloat(price);
      if (isNaN(num) || num === 0) {
        return '<span class="price-free">Gratis</span>';
      }
      const formatted = num.toLocaleString("nl-NL", {
        style: "currency",
        currency: "EUR",
        minimumFractionDigits: num % 1 === 0 ? 0 : 2,
        maximumFractionDigits: 2
      });
      return '<span class="price-paid">' + formatted + '</span>';
    }

    function formatDayDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString("nl-NL", { weekday: "long", day: "numeric", month: "long" });
    }

    function getWeekKey(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(d.setDate(diff));
      return monday.toISOString().slice(0, 10);
    }

    function getWeekLabel(mondayStr) {
      const today = new Date();
      const monday = new Date(mondayStr);
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);

      const todayMonday = new Date(today);
      const todayDay = today.getDay();
      const todayDiff = today.getDate() - todayDay + (todayDay === 0 ? -6 : 1);
      todayMonday.setDate(todayDiff);

      const diffWeeks = Math.round((monday - todayMonday) / (7 * 24 * 60 * 60 * 1000));
      const fmt = d => d.toLocaleDateString("nl-NL", { day: "numeric", month: "short" });

      if (diffWeeks === 0) return { label: "Deze week — " + fmt(monday) + " t/m " + fmt(sunday), current: true };
      if (diffWeeks === 1) return { label: "Volgende week — " + fmt(monday) + " t/m " + fmt(sunday), current: false };
      return { label: fmt(monday) + " t/m " + fmt(sunday), current: false };
    }

    /* ── Load events ── */
    fetch("https://wattedoenjonge-production.up.railway.app/events")
      .then(r => r.json())
      .then(events => {
        const app = document.getElementById("app");

        if (!events.length) {
          app.innerHTML = '<p class="loading">Geen evenementen gevonden.</p>';
          return;
        }

        events.sort((a, b) => new Date(a.date) - new Date(b.date));

        const weeks = {};
        events.forEach(event => {
          const key = getWeekKey(event.date);
          if (!weeks[key]) weeks[key] = [];
          weeks[key].push(event);
        });

        app.innerHTML = "";

        Object.keys(weeks).sort().forEach(weekKey => {
          const { label, current } = getWeekLabel(weekKey);
          const section = document.createElement("div");
          section.className = "week-section";

          let cards = "";
          weeks[weekKey].forEach(event => {
            const timeRange = event.starting_time && event.ending_time
              ? formatTime(event.starting_time) + " – " + formatTime(event.ending_time)
              : formatTime(event.starting_time);

            cards += `
              <div class="card">
                <div class="card-top">
                  ${event.category ? '<span class="category">' + event.category + '</span>' : '<span></span>'}
                  ${formatPrice(event.price)}
                </div>
                <h2>${event.title || "Naamloos evenement"}</h2>
                <div class="meta">
                  ${event.location ? '<div class="meta-row">📍 ' + event.location + '</div>' : ''}
                  <div class="meta-row">🗓️ ${formatDayDate(event.date)}</div>
                  ${timeRange ? '<div class="meta-row">🕐 ' + timeRange + '</div>' : ''}
                </div>
                ${event.description ? '<p class="desc">' + event.description + '</p>' : ''}
                ${event.recurring ? '<span class="recurring-badge">↻ Wekelijks terugkerend</span>' : ''}
              </div>
            `;
          });

          section.innerHTML = `
            <div class="week-header">
              <span class="week-label ${current ? 'current' : ''}">${label}</span>
              <div class="week-line"></div>
            </div>
            <div class="cards-grid">${cards}</div>
          `;

          app.appendChild(section);
        });
      })
      .catch(() => {
        document.getElementById("app").innerHTML =
          '<p class="error">Kon evenementen niet laden. Probeer het later opnieuw.</p>';
      });
  </script>

</body>
</html>
