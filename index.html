<!DOCTYPE html>
<html>
<head>
  <title>Local Events</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    #events-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .event-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .event-card h2 {
      margin: 0 0 8px;
      color: #222;
      font-size: 18px;
    }

    .event-card p {
      margin: 4px 0;
      color: #666;
      font-size: 14px;
    }

    .category {
      display: inline-block;
      background: #e8f0fe;
      color: #3367d6;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .price-free {
      display: inline-block;
      background: #e6f4ea;
      color: #1e7e34;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      margin-top: 10px;
    }

    .price-paid {
      display: inline-block;
      background: #fff3e0;
      color: #e65100;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      color: #999;
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <h1>Events in my city</h1>
  <div id="events-list"><p class="loading">Loading events...</p></div>

  <script>
    function formatTime(t) {
      if (!t) return "";
      return t.slice(0, 5);
    }

    function formatPrice(price) {
      if (!price || price === "0" || price.toLowerCase() === "free" || price === "gratis") {
        return '<span class="price-free">Free entry</span>';
      }
      return '<span class="price-paid">' + price + '</span>';
    }

    fetch("https://wattedoenjonge-production.up.railway.app/events")
      .then(response => response.json())
      .then(events => {

        const container = document.getElementById("events-list")

        events.sort((a, b) => new Date(a.date) - new Date(b.date));

        container.innerHTML = ""

        events.forEach(event => {
          const timeRange = event.starting_time && event.ending_time
            ? formatTime(event.starting_time) + " – " + formatTime(event.ending_time)
            : formatTime(event.starting_time);

          container.innerHTML += `
            <div class="event-card">
              <span class="category">${event.category}</span>
              <h2>${event.title}</h2>
              <p>📍 ${event.location}</p>
              <p>🗓️ ${new Date(event.date).toLocaleDateString("nl-NL", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</p>
              ${timeRange ? `<p>🕐 ${timeRange}</p>` : ""}
              ${formatPrice(event.price)}
              <p style="margin-top: 10px;">${event.description}</p>
            </div>
          `
        })

      })
  </script>

</body>
</html>
